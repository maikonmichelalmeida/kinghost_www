<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leitura</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="shell">
    <section class="reader-panel" aria-live="polite">
      <section class="practice" data-practice hidden>
        <div class="block-head">
          <span data-block-position>Bloco 1 de 1</span>
          <span data-block-title></span>
        </div>

        <article class="prompt-card">
          <p data-portuguese>Carregando...</p>
        </article>

        <label class="typing-label" for="english-input">Digite em ingles</label>
        <div class="typing-shell" data-typing-shell>
          <div class="typing-progress" aria-hidden="true">
            <span data-progress-bar></span>
          </div>
          <textarea
            id="english-input"
            class="typing-capture"
            data-typing-capture
            aria-label="Entrada de digitacao em ingles"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
          ></textarea>
          <div
            class="smart-input"
            data-smart-input
            aria-hidden="true"
          ></div>
          <div class="stall-meter" data-stall-meter aria-hidden="true">
            <span data-stall-bar></span>
          </div>
        </div>

        <div class="assist-row" data-assist-row>
          <span class="assist-message" data-assist-message></span>
        </div>

        <div class="actions">
          <button class="button secondary" type="button" data-prev>Anterior</button>
          <button class="button ghost" type="button" data-show-answer>Ver resposta</button>
          <button class="button primary" type="button" data-next>Continuar</button>
        </div>

        <div class="answer-panel" data-answer-panel hidden>
          <span>Resposta</span>
          <p data-answer-text></p>
        </div>
      </section>

      <p class="load-error" data-load-error hidden></p>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
